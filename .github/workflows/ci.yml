name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Resolve diff range
        id: diff_range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect feature routes
        id: feature_routes
        env:
          CI_BASE_SHA: ${{ steps.diff_range.outputs.base_sha }}
          CI_HEAD_SHA: ${{ steps.diff_range.outputs.head_sha }}
        run: npm run ci:feature-routes

      - name: Capture feature screenshots
        if: steps.feature_routes.outputs.has_routes == 'true'
        env:
          SCREENSHOT_ROUTES_JSON: ${{ steps.feature_routes.outputs.routes_json }}
        run: npm run test:e2e:screenshots

      - name: Upload feature screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-screenshots-${{ github.run_id }}
          path: artifacts/feature-screenshots
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
