name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Resolve app page files
        id: app_pages
        run: |
          APP_PAGE_FILES="$(git ls-files src/app | grep '/page.tsx$' || true)"
          {
            echo "files<<EOF"
            echo "$APP_PAGE_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve screenshot routes
        id: screenshot_routes
        env:
          CHANGED_FILES: ${{ steps.app_pages.outputs.files }}
        run: pnpm run ci:feature-routes

      - name: Capture feature screenshots
        env:
          SCREENSHOT_ROUTES_JSON: ${{ steps.screenshot_routes.outputs.routes_json }}
        run: pnpm run test:e2e:screenshots

      - name: Upload feature screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-screenshots-${{ github.run_id }}
          path: artifacts/feature-screenshots
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
